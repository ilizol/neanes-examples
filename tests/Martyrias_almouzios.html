      :root {
        
        --byz-neume-font-family: Almouzios;
        --byz-neume-font-size: 26pt;
        
        --byz-lyric-font-family: 'Alegreya', 'Almouzios';
        --byz-lyric-font-size: 16pt;
        --byz-lyric-offset-h: 3.6pt;
        --byz-lyric-offset-v: 0pt;

        --byz-drop-cap-font-family: 'Source Serif';
        --byz-drop-cap-font-size: 60pt;
        --byz-drop-cap-offset-v: 30.249999999999996pt;
        --byz-drop-cap-color: #000000;

        --byz-color-accidental: #ED0000;
        --byz-color-agogi: #ED0000;
        --byz-color-barline: #ED0000;
        --byz-color-fthora: #ED0000;
        --byz-color-gorgon: #ED0000;
        --byz-color-heteron: #ED0000;
        --byz-color-ison-indicator: #ED0000;
        --byz-color-koronis: #ED0000;
        --byz-color-martyria: #ED0000;
        --byz-color-measure-number: #000000;
        --byz-color-note-indicator: #ED0000;
      }
      
      body {
        
        margin: 72pt 72pt 72pt 72pt;
      }

      

      @page {
        margin: 72pt 72pt 72pt 72pt;
        size: A4 portrait
      }

      

      @media print {
        body {
          margin: 0;
        }
      }

      @media screen and (max-width: 768px) {
        body {
          margin: 24px;
        }
      }

      x-ly {
        color: #000000;
        font-weight: 500;
        font-style: normal;
        -webkit-text-stroke-width: 0;
        -webkit-text-stroke-color: currentcolor;
        text-decoration: none;
      }

      x-dc {
        font-weight: 400;
        font-style: normal;
        -webkit-text-stroke-width: 0;
        -webkit-text-stroke-color: currentcolor;
      }

      x-gor, x-pel {
        --byz-neume-font-size: 16pt;
        line-height: 16pt;
      }

      x-m.byz--m-align-right {
        margin-left: auto;
      }

      .byz--line-break {
        margin-left: auto;
      }

      .byz--text-box {

        font-size: 20pt;
        font-weight: 400;
        font-style: normal;
        color: #000000;
        -webkit-text-stroke-width: 0;
        -webkit-text-stroke-color: currentcolor;
        text-decoration: none;

        display: flex;
        align-items: center;

        font-style: normal;

      .byz--mode-key {
        position: relative;
        font-size: 20pt;
        color: #ED0000;

      }

      .byz--mode-key .byz--t {

        top: -9pt;
        margin-left: 8px;
      }

      .byz--mode-key .byz--t-align-right {
        position: absolute;
        right: 0;
      }

      .byz--neume-paragraph {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        margin-bottom: 26pt;
      }

      .byz--neume-paragraph:last-child {
        margin-bottom: 0;
      }

      .byz--neume-paragraph-center {
        justify-content: center;
      }
